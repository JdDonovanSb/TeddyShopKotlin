plugins {
    id 'org.jetbrains.kotlin.jvm' version '2.1.10'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation("com.microsoft.sqlserver:mssql-jdbc:12.4.2.jre11") // Versión más reciente del driver JDBC
}

test {
    useJUnitPlatform()
}
kotlin {
    jvmToolchain(23)
}